<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copy Selected Tab Links — Options</title>
  </head>
  <body>
    <h1>Options</h1>

    <div style="margin-bottom: 12px">
      <label>
        <input id="closeAfterCopy" type="checkbox" />
        Close tabs after copy
      </label>
    </div>

    <div style="margin-bottom: 12px">
      <label for="separator">Separator between URLs</label><br />
      <input id="separator" type="text" style="width: 320px" />
      <p>
        Examples: space (<code> </code>), newline (<code>\n</code>), comma+space
        (<code>, </code>)
      </p>
    </div>

    <button id="save">Save</button>
    <span id="status" role="status" aria-live="polite"></span>

    <script src="options.js"></script>
  </body>
</html>
